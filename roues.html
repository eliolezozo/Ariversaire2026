<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Challenge 11 - Les Roues</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Maintien de ton style d'origine */
        .wheel-container {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-top: 50px;
        }
        .wheel-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--primary);
            width: 30%;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <div class="score-display">
            Points : <span id="current-score">0</span> | 
            Cagnotte : <span id="current-cash">0.00</span>€
        </div>
    </header>

    <section class="page active">
        <h1>Les Roues de la Fortune</h1>

        <div class="wheel-container">
            <div class="wheel-card">
                <h3>Roue du Paysan</h3>
                <p>Coût : 30 pts</p>
                <button class="nav-btn" onclick="spin('paysan')">Tourner la roue</button>
            </div>

            <div class="wheel-card">
                <h3>Roue du Chevalier</h3>
                <p>Coût : 100 pts</p>
                <button class="nav-btn" onclick="spin('chevalier')">Tourner la roue</button>
            </div>

            <div class="wheel-card">
                <h3>Roue du Seigneur</h3>
                <p>Coût : 250 pts</p>
                <button class="nav-btn" onclick="spin('seigneur')">Tourner la roue</button>
            </div>
        </div>

        <button class="nav-btn" style="margin-top: 40px; width: 100%;" onclick="window.location.href='index.html'">Retour au menu</button>
    </section>

    <script>
        const wheels = {
            paysan: {
                cost: 30,
                segments: [
                    { type: 'cash', val: -0.3, label: '-0.30€' },
                    { type: 'cash', val: -0.1, label: '-0.10€' },
                    { type: 'cash', val: 0.3,  label: '+0.30€' },
                    { type: 'cash', val: 0.5,  label: '+0.50€' },
                    { type: 'cash', val: 1.0,  label: '+1.00€' },
                    { type: 'cash', val: 2.0,  label: '+2.00€' },
                    { type: 'pts',  val: 30,   label: '+30 pts' },
                    { type: 'pts',  val: 60,   label: '+60 pts' }
                ]
            },
            chevalier: {
                cost: 100,
                segments: [
                    { type: 'cash', val: -1.0, label: '-1.00€' },
                    { type: 'pts',  val: -50,  label: '-50 pts' },
                    { type: 'cash', val: 0.2,  label: '+0.20€' },
                    { type: 'cash', val: 0.5,  label: '+0.50€' },
                    { type: 'cash', val: 1.0,  label: '+1.00€' },
                    { type: 'cash', val: 2.0,  label: '+2.00€' },
                    { type: 'cash', val: 5.0,  label: '+5.00€' },
                    { type: 'pts',  val: 150,  label: '+150 pts' }
                ]
            },
            seigneur: {
                cost: 250,
                segments: [
                    { type: 'cash', val: -4.0, label: '-4.00€' },
                    { type: 'cash', val: -2.0, label: '-2.00€' },
                    { type: 'pts',  val: 50,   label: '+50 pts' },
                    { type: 'pts',  val: 150,  label: '+150 pts' },
                    { type: 'cash', val: 0.5,  label: '+0.50€' },
                    { type: 'cash', val: 2.0,  label: '+2.00€' },
                    { type: 'cash', val: 5.0,  label: '+5.00€' },
                    { type: 'cash', val: 8.0,  label: '+8.00€' }
                ]
            }
        };

        function updateDisplay() {
            const score = localStorage.getItem('score') || 0;
            const cash = parseFloat(localStorage.getItem('cash')) || 0;
            document.getElementById('current-score').innerText = score;
            document.getElementById('current-cash').innerText = cash.toFixed(2);
        }

        function spin(tier) {
            let score = parseInt(localStorage.getItem('score')) || 0;
            let cash = parseFloat(localStorage.getItem('cash')) || 0;
            const config = wheels[tier];

            if (score < config.cost) {
                alert("Pas assez de points !");
                return;
            }

            score -= config.cost;
            const result = config.segments[Math.floor(Math.random() * config.segments.length)];

            if (result.type === 'cash') {
                cash += result.val;
            } else {
                score += result.val;
            }

            localStorage.setItem('score', Math.max(0, score));
            localStorage.setItem('cash', cash.toFixed(2));

            updateDisplay();
            alert("Résultat : " + result.label);
        }

        updateDisplay();
    </script>
</body>
</html>
